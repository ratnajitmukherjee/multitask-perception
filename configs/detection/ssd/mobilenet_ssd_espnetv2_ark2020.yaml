MODEL:
  NUM_CLASSES: 5
  HEAD:
    DET_NAME: "SSDBoxHead"
    SEG_NAME: "ESPNetv2Segmentation"
    FOCAL_LOSS: False
    LOSS_WEIGHTS: { "seg": 10 }
  BACKBONE:
    NAME: "mobilenet_v2"
    OUT_CHANNELS: (32, 96, 1280, 512, 256, 256)
    FEATURE_MAPS: [64, 32, 16, 8, 4, 2]
    EXTRA: True
    PRETRAINED: False
  PRIORS:
    STRIDES: [8, 16, 32, 64, 128, 256]
    MIN_SIZES: [20.48, 51.2, 133.12, 215.04, 296.96, 378.88]
    MAX_SIZES: [51.2, 133.12, 215.04, 296.96, 378.88, 460.8]
    ASPECT_RATIOS: [[2, 3], [2, 3], [2, 3], [2, 3], [2, 3], [2, 3]]
    BOXES_PER_LOCATION: [6, 6, 6, 6, 6, 6]
INPUT:
  IMAGE_SIZE: 512
DATASETS:
  TRAIN: ("ark_2020_train",)
  TEST: ("ark_2020_minival",)
DATA_LOADER:
  NUM_WORKERS: 8
SOLVER:
  NAME: "SGD_optimizer"
  MAX_ITER: 400000
  LR_STEPS: [280000, 360000]
  WARMUP_ITERS: 500
  WEIGHT_DECAY: 1e-4
  GAMMA: 0.1
  BATCH_SIZE: 16
  LR: 1e-3

OUTPUT_DIR: "/volumes2/multitask_training/mobilenetv2_ssd_espnetv2_ark4"
