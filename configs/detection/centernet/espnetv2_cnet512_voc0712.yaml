MODEL:
  NUM_CLASSES: 20
  BACKBONE:
    SCALE: 1.5
    NAME: "ESPNetv2_x1_5"
    OUT_CHANNEL: 1024
    FEATURE_MAPS: (16,)
    EXTRA: True
    WEIGHTS_PATH: "/data/input/weights/espnetv2"
  HEAD:
    DET_NAME: "CenterNetHead"
    SEG_NAME: "ESPNetv2Segmentation"
    BACKBONE_FEATURE: 16
    HEAD_CONFIG: { "hm": 20, "wh": 2, "reg": 2 }
    LOSS_WEIGHTS: { "hm": 1, "wh": 0.1, "reg": 1 }
    NUM_DECONV_LAYERS: 3
    DECONV_LAYER_CONFIG: [512, 256, 128]
    DECONV_KERNEL: [4, 4, 4]
    HEAD_CONV: 128
INPUT:
  IMAGE_SIZE: 512
DATASETS:
  TRAIN: ("coco_2014_train", "coco_2014_valminusminival")
  TEST: ("coco_2014_minival", )
DATA_LOADER:
  NUM_WORKERS: 0
  INCLUDE_BACKGROUND: False
SOLVER:
  NAME: "SGD_optimizer"
  MAX_ITER: 120000
  LR_STEPS: [80000, 100000]
  WARMUP_ITERS: 500
  WEIGHT_DECAY: 1e-4
  GAMMA: 0.1
  BATCH_SIZE: 8
  LR: 1e-3
TEST:
  BATCH_SIZE: 10
OUTPUT_DIR: "outputs/espnetv2_cnet512_voc0712"
