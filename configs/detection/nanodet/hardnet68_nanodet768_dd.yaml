TASK:
  ENABLED: ["detection"] # options are [Detection, Segmentation, Multitask]
MODEL:
  #  NUM_SEG_CLASSES: 4
  HEADS:
    DETECTION:
      NUM_CLASSES: 11
      NAME: "NanoDet"
  BACKBONE:
    NAME: "HarDNet68"
    OUT_CHANNELS: (640, 1024, 512)
    FEATURE_MAPS: (48, 24, 12)
    FEATURE_INDICES: (2, 3, 4)
    EXTRA: True
INPUT:
  IMAGE_SIZE: 768
DATASETS:
  TRAIN: ["damage_detection_old-train"]
  TEST: ["damage_detection_old-val"]
  #  This is the local path (not required for ClearML)
  PATH: "/media/lensor/2TBdrive/datasets/damage_detection_old/ddd_torno"
DATALOADER:
  BATCH_SIZE: 12
  NUM_WORKERS: 8
  INCLUDE_BACKGROUND: False
SOLVER:
  OPTIMIZER: "SGD_optimizer"
  MAX_ITER: 640000
  LR_STEPS: [450000, 570000]
  WARMUP_ITERS: 500
  WEIGHT_DECAY: 1e-4
  GAMMA: 0.1
  BASE_LR: 1e-3

OUTPUT_DIR: "./output/"
