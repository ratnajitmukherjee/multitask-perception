TASK:
  ENABLED: ["detection", "segmentation"] # options are [Detection, Segmentation, Multitask]
MODEL:
  BACKBONE:
    NAME: "vovnet39"
    OUT_CHANNELS: (512, 768, 1024)
    FEATURE_MAPS: (64, 32, 16)
    FEATURE_INDICES: (1, 2, 3)
    EXTRA: True
  HEADS:
    DETECTION:
      NUM_CLASSES: 80
      NAME: "NanoDet"
      LOSS_WEIGHTS: { "seg": 1 }
    SEGMENTATION:
      NUM_CLASSES: 92
      NAME: "DeepLabV3"
      ASPP_INDEX: 2
      DECODER_INDEX: 2
      OUTPUT_STRIDE: 16
INPUT:
  IMAGE_SIZE: 512
DATASETS:
  TRAIN: ["coco_128-train"]
  TEST: ["coco_128-val"]
  PATH: "/home/lensor/Downloads/datasets/coco128"
DATALOADER:
  BATCH_SIZE: 2
  LOCAL_MASKS: True
  NUM_WORKERS: 1
  INCLUDE_BACKGROUND: False
SOLVER:
  OPTIMIZER: "SGD_optimizer"
  MAX_ITER: 400000
  LR_STEPS: [280000, 360000]
  WARMUP_ITERS: 500
  WEIGHT_DECAY: 1e-4
  GAMMA: 0.1
  BASE_LR: 1e-3

OUTPUT_DIR: "home/lensor/Desktop/multitask_output"
